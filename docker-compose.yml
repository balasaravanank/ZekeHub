services:
  server-page:
    build: .
    container_name: server-page
    restart: unless-stopped

    ports:
      - "3080:3001"

    environment:
      - NODE_ENV=production

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    networks:
      - homelab

networks:
  homelab:
    external: true